<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mikupedia — Produk Viral TikTok</title>
  <meta name="description" content="Kurator produk TikTok terpercaya — langsung ke Shopee." />
  <!-- Open Graph untuk share ke social media -->
  <meta property="og:title" content="Mikupedia — Produk Viral TikTok" />
  <meta property="og:description" content="Produk pilihan FYP, harga terbaik di Shopee." />
  <meta property="og:type" content="website" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── NAV ── -->
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a class="nav-logo" href="#">
        <span class="logo-miku">Miku</span><span class="logo-pedia">pedia</span>
      </a>
      <div class="nav-links">
        <a href="#products">Produk</a>
        <a href="#" id="nav-tiktok" target="_blank" rel="noopener">TikTok ↗</a>
      </div>
    </div>
  </nav>

  <!-- ── HERO ── -->
  <section class="hero">
    <div class="hero-noise"></div>
    <div class="hero-glow glow-teal"></div>
    <div class="hero-glow glow-pink"></div>

    <div class="hero-inner">
      <span class="hero-label" id="hero-label"></span>
      <h1 class="hero-title" id="hero-title"></h1>
      <p class="hero-subtitle" id="hero-subtitle"></p>
      <a class="btn-hero" href="#products" id="hero-cta"></a>
    </div>

    <!-- Ticker berjalan -->
    <div class="ticker-wrap">
      <div class="ticker-track" id="ticker-track"></div>
    </div>
  </section>

  <!-- ── KATEGORI ── -->
  <section class="section-filter" id="products">
    <div class="container">
      <div class="filter-bar" id="filter-bar"></div>
    </div>
  </section>

  <!-- ── PRODUK GRID ── -->
  <section class="section-products">
    <div class="container">
      <div class="products-grid" id="products-grid"></div>
      <p class="empty-state" id="empty-state" style="display:none">Belum ada produk di kategori ini.</p>
    </div>
  </section>

  <!-- ── FOOTER ── -->
  <footer class="footer">
    <div class="container footer-inner">
      <a class="nav-logo" href="#">
        <span class="logo-miku">Miku</span><span class="logo-pedia">pedia</span>
      </a>
      <p class="footer-text" id="footer-text"></p>
      <div class="footer-socials">
        <a id="footer-tiktok" href="#" target="_blank" rel="noopener" class="social-btn tiktok-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.22 8.22 0 0 0 4.78 1.52V6.77a4.85 4.85 0 0 1-1.01-.08z"/></svg>
          TikTok
        </a>
        <a id="footer-shopee" href="https://shopee.co.id" target="_blank" rel="noopener" class="social-btn shopee-btn">
          🛒 Shopee
        </a>
      </div>
    </div>
  </footer>

  <!-- Modal detail produk -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-card" id="modal-card">
      <button class="modal-close" id="modal-close">✕</button>
      <img class="modal-img" id="modal-img" src="" alt="" />
      <div class="modal-body">
        <span class="modal-badge" id="modal-badge"></span>
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-pricing">
          <span class="modal-price" id="modal-price"></span>
          <span class="modal-discount" id="modal-discount"></span>
        </div>
        <div class="modal-meta">
          <span id="modal-rating-stars"></span>
          <span id="modal-sold"></span>
        </div>
        <a class="btn-shopee" id="modal-shopee-btn" href="#" target="_blank" rel="noopener">
          🛒 Beli di Shopee
        </a>
      </div>
    </div>
  </div>

  <!-- Load config dulu, baru app -->
  <script src="products.js"></script>
  <script src="app.js"></script>
</body>
</html>
