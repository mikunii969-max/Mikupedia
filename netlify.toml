# netlify.toml — Konfigurasi Netlify untuk Mikupedia

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Redirect www ke non-www (aktifkan jika pakai custom domain)
# [[redirects]]
#   from = "https://www.mikupedia.com/*"
#   to   = "https://mikupedia.com/:splat"
#   status = 301
